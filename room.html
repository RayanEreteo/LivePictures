<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=TASA+Orbiter:wght@400..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
    <link rel="stylesheet" href="./src/button.css">
    <title>Lives Pictures | Channel</title>
</head>

<body>
    <div class="app">
        <h2 id="id-text">Channel ID : ID</h2>
        <form id="image-form">
            <div class="file-input-wrapper">
                <input type="file" id="image-import-input" accept="image/*">
                <label for="image-import-input" class="file-label">
                    <span class="file-name">Choose an image...</span>
                </label>
            </div>
            <button class="btn-secondary" style="width: 200px;">Send Image</button>
            <img id="image">
        </form>
    </div>
    <script type="module" src="./src/room.ts"></script>
</body>

</html>
