<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=TASA+Orbiter:wght@400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
    <link rel="stylesheet" href="./src/button.css">
    <title>Lives Pictures</title>
  </head>
  <body>
    <div id="app">
      <h1>Lives Pictures</h1>
      <p id="description">Send images in real time, no account required !</p>
      <form method="POST" id="channel-form">
        <input type="text" placeholder="Channel ID" name="channel-id" id="channel-id" required>
        <button id="submit-btn" type="submit" class="btn-main" disabled>Enter Channel</button>
      </form>
      <p style="margin-top: 1.6rem; background: red; border-radius: 10px; padding: 0.3rem; display: none" id="server-message">Placeholder</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
