<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=TASA+Orbiter:wght@400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
    <link rel="stylesheet" href="./src/button.css">
    <title>Lives Pictures</title>
  </head>
  <body>
    <div id="app">
      <h1>Lives Pictures</h1>
      <p id="description">Send images in real time, no account required !</p>
      <form method="POST">
        <input type="text" placeholder="Channel ID" name="channel-id" id="channel-id" required>
        <input type="text" placeholder="Channel Password" name="channel-password" id="channel-password" required>
        <button type="submit" class="btn-main">Enter Channel</button>
        <button class="btn-secondary">Create Channel</button>
      </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
